version: "3.9"

services:

  # 취약 웹 서비스 및 REST API
  backend:
    # backend 폴더의 Dockerfile을 이용하여 이미지 생성
    build:
      context: ./Backend

    # 컨테이너 이름
    container_name: vulnerable-backend

    # 호스트 포트:컨테이너 포트
    ports:
      - "5000:5000"

    # 환경 변수
    environment:
      FLASK_ENV: development
      MYSQL_HOST: db
      MYSQL_DATABASE: security_db
      MYSQL_USER: security
      MYSQL_PASSWORD: security123

    # DB가 먼저 실행된 후 backend 실행
    depends_on:
      - db

    # 공통 네트워크 사용
    networks:
      - security-network


  # 웹/API 자동 진단 엔진 
  # Platform이 scanner.py를 직접 실행하므로 별도 컨테이너는 실행하지 않음(코드 보관용)
  scanner:
    # scanner 폴더의 Dockerfile 사용
    build:
      context: ./Scanner

    container_name: security-scanner


    command:
      - python
      - -c
      - |
        import time
        while True:
            time.sleep(3600)
    
    # Scanner가 생성한 검사 결과(JSON)를 Report 컨테이너와 공유하기 위한 볼륨
    volumes:
      - scanner-results:/app/results

    networks:
      - security-network


  # 결과 분석 및 Dashboard
  # Platform이 report.py를 직접 실행
  report:
    # report 폴더의 Dockerfile 사용
    build:
      context: ./Report

    container_name: report-generator

    command:
      - python
      - -c
      - |
        import time
        while True:
            time.sleep(3600)


    # Scanner가 생성한 검사 결과(JSON)를 동일한 경로에서 읽기 위한 공유 볼륨
    volumes:
      - scanner-results:/app/results

    networks:
      - security-network

  # 사용자 UI 및 Scanner/Report 실행 제어 플랫폼
  platform:

    # Platform Dockerfile 사용
    build:
      context: ./Platform


    container_name: security-platform


    # 사용자 접속 포트
    ports:
      - "8080:8080"


    # Scanner와 Report 결과 공유
    volumes:
      - scanner-results:/app/results
      - ./Scanner:/app/scanner
      - ./Report:/app/report


    depends_on:
      - backend
      - scanner
      - report


    networks:
      - security-network


  # MySQL Database
  db:
    # MySQL 8.0 공식 이미지 사용
    image: mysql:8.0

    container_name: mysql-db

    # 컨테이너 종료 후 자동 재시작
    restart: unless-stopped

    # DB 초기 환경 설정
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: security_db
      MYSQL_USER: security
      MYSQL_PASSWORD: security123

    # DB 접속 포트
    ports:
      - "3306:3306"

    # 데이터 영속성 보장
    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - security-network


# Docker Volume
# 컨테이너를 삭제해도 DB 데이터는 유지됨
# Scanner와 Report가 검사 결과를 공유하기 위한 볼륨
volumes:
  mysql-data:
  scanner-results:


# Docker Network
# 모든 서비스가 동일한 네트워크에서 통신
networks:
  security-network:
    driver: bridge

