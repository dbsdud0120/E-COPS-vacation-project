<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
</head>
<body>

<h1>게시판</h1>

<h2>게시글 작성</h2>

<form method="POST">

    제목 :
    <input
        type="text"
        name="title"
        maxlength="100"
        required
    >

    <br><br>

    내용 :
    <textarea name="content" required></textarea>

    <br><br>

    작성자 :
    <input type="text" name="writer" required>

    <br><br>

    <input type="submit" value="작성">

</form>

<hr>

<h2>게시글 검색</h2>

<form method="GET">

    <input
        type="text"
        name="keyword"
        placeholder="제목을 입력하세요"
        value="{{ keyword }}"
    >

    <input type="submit" value="검색">

</form>

<hr>

<h2>게시글 목록</h2>

{% if posts %}

    {% for post in posts %}

        <h3>{{ post[1] }}</h3>

        <p>{{ post[2] }}</p>

        <small>작성자 : {{ post[3] }}</small>

        <br><br>

        <a href="/posts/edit/{{ post[0] }}">
            수정
        </a>

        &nbsp;&nbsp;

        <a
            href="/posts/delete/{{ post[0] }}"
            onclick="return confirm('삭제하시겠습니까?');"
        >
            삭제
        </a>

        <hr>

    {% endfor %}

{% else %}

    <p>검색 결과가 없습니다.</p>

{% endif %}

</body>
</html>
