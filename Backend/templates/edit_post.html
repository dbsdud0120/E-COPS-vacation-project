<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
</head>
<body>

<h1>게시글 수정</h1>

<form method="POST">

    제목<br>
    <input
        type="text"
        name="title"
        value="{{ post[1] }}"
        maxlength="100"
        required
    >

    <br><br>

    내용<br>

    <textarea
        name="content"
        rows="8"
        cols="50"
        required
    >{{ post[2] }}</textarea>

    <br><br>

    <input type="submit" value="수정">

</form>

<br>

<a href="/posts">목록으로</a>

</body>
</html>
